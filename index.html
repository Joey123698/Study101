<!-- V12: split into modules, loaded in dependency order.
     babel-standalone transpiles each <script type="text/babel" src="..."> in
     document order and executes them sharing one global scope — same behavior
     as a single file, just organized. Requires serving over HTTP(S)
     (GitHub Pages, Netlify, local dev server) — will NOT work via file://
     due to fetch/CORS restrictions on local files. -->
